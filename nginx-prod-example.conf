# Пример nginx-конфига для production deploy period_bot на medina.garum.tech
#
# Предположения:
# - frontend собран в dist и развернут в каталог, доступный nginx
# - backend доступен по локальному порту 8081
# - meal_bot остаётся на 8080 и обрабатывает /oauth2callback

server {
    listen 80;
    server_name medina.garum.tech;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name medina.garum.tech;

    ssl_certificate /etc/letsencrypt/live/medina.garum.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/medina.garum.tech/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Статическая заглушка для корня домена
    root /var/www/medina;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location = /period {
        return 301 /period/$is_args$args;
    }

    location /period/ {
        # Статическое развертывание фронтенда из период бота
        root /var/www/period_bot/frontend/dist;
        rewrite ^/period/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    # API-запросы period_bot, если фронтенд делает их через /api/
    location /api/ {
        proxy_pass http://127.0.0.1:8081/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Сохранить callback meal_bot на текущем 8080
    location /oauth2callback {
        proxy_pass http://127.0.0.1:8080/oauth2callback;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Остальное отдаём как статическую заглушку
    location / {
        try_files $uri $uri/ /index.html;
    }
}
